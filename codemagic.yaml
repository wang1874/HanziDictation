workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build Android APK using expo
        script: |
          npx expo run:android --variant debug
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
