workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Generate Android project
        script: |
          npx expo prebuild --platform android
      - name: Expo export for Android
        script: |
          npx expo export --platform android
      - name: Copy bundle to assets
        script: |
          mkdir -p android/app/src/main/assets
          cp dist/android-assets/index.android.bundle android/app/src/main/assets/
          cp -r dist/android-assets/res/* android/app/src/main/res/
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
